name: Ingest — MSSS Urgences (hourly)

on:
  schedule:
    # Every hour at :05 (gives MSSS time to publish)
    - cron: "5 * * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Needed to commit archived CSVs to /data

jobs:
  ingest:
    name: Fetch & Upsert
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ingest script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm ingest

      - name: Commit archived CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: archive CSV snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
