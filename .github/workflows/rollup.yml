name: Rollup — Weekly aggregation

on:
  # Disabled — schedule removed to prevent DB cleanup/deletion
  # schedule:
  #   # Every Sunday at 02:00 UTC
  #   - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  rollup:
    name: Aggregate old snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run rollup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm tsx scripts/rollup.ts
